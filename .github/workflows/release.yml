name: Release Quiz Blocks

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Get version from tag
        id: version
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Update manifest version
        run: |
          node -e "
            const fs = require('fs');
            const m = JSON.parse(fs.readFileSync('src/assets/manifest.json', 'utf8'));
            m.version = '${{ steps.version.outputs.tag }}'.replace(/^v/, '');
            fs.writeFileSync('src/assets/manifest.json', JSON.stringify(m, null, 2) + '\n');
            console.log('Manifest version updated to:', m.version);
          "

      - name: Type check
        run: npm run check

      # Le build passe par esbuild.config.mjs : une config esbuild dupliquée ici
      # diverge en silence (les loaders de fontes MathLive y ont manqué).
      # Hors Windows, aucun vault n'est détecté : la sortie reste dans dist/.
      - name: Build
        run: npm run build

      - name: Collect release files
        run: |
          mkdir -p release
          cp dist/main.js dist/styles.css release/
          cp src/assets/manifest.json release/manifest.json

      - name: List release files
        run: ls -lh release/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "${{ steps.version.outputs.tag }}"
          body: "Release ${{ steps.version.outputs.tag }}"
          files: |
            release/main.js
            release/manifest.json
            release/styles.css
