name: Release Quiz Blocks

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Get version from tag
        id: version
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Update manifest version
        run: |
          node -e "
            const fs = require('fs');
            const m = JSON.parse(fs.readFileSync('src/assets/manifest.json', 'utf8'));
            m.version = '${{ steps.version.outputs.tag }}'.replace(/^v/, '');
            fs.writeFileSync('src/assets/manifest.json', JSON.stringify(m, null, 2) + '\n');
            console.log('Manifest version updated to:', m.version);
          "

      - name: Build main.js
        run: |
          node -e "
            const esbuild = require('esbuild');
            esbuild.buildSync({
              entryPoints: ['src/main.ts'],
              outfile: 'release/main.js',
              bundle: true,
              format: 'cjs',
              platform: 'node',
              target: 'es2020',
              sourcemap: false,
              external: ['obsidian', 'electron'],
            });
            console.log('main.js built successfully');
          "
        env:
          NODE_ENV: production

      - name: Bundle CSS
        run: |
          mkdir -p release
          node -e "
            const esbuild = require('esbuild');
            const fs = require('fs');
            esbuild.buildSync({
              entryPoints: ['src/assets/css/index.css'],
              outfile: 'release/styles.css',
              bundle: true,
              minify: false,
            });
            // Remove esbuild entry point comment
            let css = fs.readFileSync('release/styles.css', 'utf8');
            css = css.replace(/\n\/\* src\/assets\/css\/index\.css \*\/\s*$/, '');
            fs.writeFileSync('release/styles.css', css);
            console.log('styles.css bundled successfully');
          "

      - name: Copy manifest
        run: cp src/assets/manifest.json release/manifest.json

      - name: List release files
        run: ls -lh release/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "${{ steps.version.outputs.tag }}"
          body: "Release ${{ steps.version.outputs.tag }}"
          files: |
            release/main.js
            release/manifest.json
            release/styles.css
